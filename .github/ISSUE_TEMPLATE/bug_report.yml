name: Bug Report
description: Report a bug in kanban-handler
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Commands or steps to reproduce the behavior.
      placeholder: |
        1. Run `kanban issues list --project abc`
        2. See error...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include output with `--verbose` if possible.

  - type: input
    id: version
    attributes:
      label: kanban-handler version
      placeholder: "0.1.0"

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.11.0"

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
